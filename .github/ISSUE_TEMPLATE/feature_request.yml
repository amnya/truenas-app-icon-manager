name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the workflow you want to improve and why it matters.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that the app does not handle today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the app to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention any workaround or different approach you tried.
  - type: input
    id: truenas-version
    attributes:
      label: TrueNAS SCALE version
      placeholder: 25.10.1
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I may be able to test this on my TrueNAS system.
          required: false
        - label: I may be able to open a pull request for this.
          required: false
